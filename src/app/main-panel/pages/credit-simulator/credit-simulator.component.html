<div class="pai p-5" >
   

      <mat-card class="mt-40  p-5">

        <mat-card-title class="mb-4 fs-2">Simule o seu Empréstimo:</mat-card-title>

        <mat-form-field appearance="outline">
          <mat-label>Escolha uma opção</mat-label>
          <mat-select [(ngModel)]="selectedOption">
            <mat-option value="input1">Empréstimo Pessoal</mat-option>
            <mat-option value="input2">Consignado</mat-option>
          </mat-select>
        </mat-form-field>

        <div *ngIf="selectedOption === 'input1'">
            @defer (on interaction) {
                <app-emprestimo-pessoal></app-emprestimo-pessoal>
            }
            @placeholder {
                <p>Carregando componente de Empréstimo Pessoal...</p>
            }
        </div>

        <div *ngIf="selectedOption === 'input2'">
            @defer (on immediate) {
                <app-consignado></app-consignado>
            }
            @loading (minimum 2s) {
                <p>Carregando componente de Consignado...</p>
            }
        </div>
