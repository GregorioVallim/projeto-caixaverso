<div class="container-transfer pt-5">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" >
        <mat-card appearance="outlined" class="mt-5 p-5" >
            <mat-card-title class="mb-4">Cadastre a Transferência</mat-card-title>

            <mat-form-field>
                <mat-label for="agencia">Agência</mat-label>
                <input type="number" id="agencia" formControlName="agencia" matInput>
            </mat-form-field>

            <mat-form-field>
                <mat-label for="conta">Conta</mat-label>
                <input type="number" id="conta" formControlName="conta" matInput>
            </mat-form-field>

            <mat-form-field>
                <mat-label for="tipoPessoa" >Tipo de Pessoa</mat-label>
                <mat-select id="tipoPessoa" formControlName="tipoPessoa">
                    <mat-option [value]="tipoPessoaEnum.CPF" >Pessoa Física</mat-option>
                    <mat-option [value]="tipoPessoaEnum.CNPJ" >Pessoa Jurídica</mat-option>
                </mat-select>
            </mat-form-field>

            <mat-form-field>
                <mat-label for="nome">Nome</mat-label>
                <input type="string" id="nome" formControlName="nome" matInput>
            </mat-form-field>

            <mat-form-field>
                <mat-label for="cpf">CPF</mat-label>
                <input type="string" id="cpf" formControlName="cpf" matInput>
            </mat-form-field>

            <!-- <mat-form-field>
                <mat-label for="date" >Data</mat-label>
                <input type="date" id="date" formControlName="date" matInput>
            </mat-form-field> -->

            <mat-form-field>
                <mat-label>Data</mat-label>
                <input matInput [matDatepicker]="picker" formControlName="date">
                <!-- <mat-hint>DD/MM/YYYY</mat-hint> -->
                <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
                <mat-datepicker #picker></mat-datepicker>
            </mat-form-field>
            

            <mat-form-field>
                <mat-label for="description">Descrição</mat-label>
                <input type="text" id="description" formControlName="description" placeholder="Descreva a transação" matInput>
            </mat-form-field>

            <mat-form-field>
                <mat-label for="amount">Valor</mat-label>
                <input type="number" id="amount" formControlName="amount" matInput>
            </mat-form-field>

            <mat-form-field>
                <mat-label for="type" >Tipo de transação</mat-label>
                <mat-select id="type" formControlName="type">
                    <mat-option [value]="transactionTypeEnum.INCOME" >Entrada</mat-option>
                    <mat-option [value]="transactionTypeEnum.EXPENSE" >Saída</mat-option>
                </mat-select>
            </mat-form-field>

            
            <div class="mt-3">
                <button class="px-4 fs-5" type="submit" mat-stroked-button>Enviar</button>            
            </div>

        </mat-card>
    </form>
</div>
