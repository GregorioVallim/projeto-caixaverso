<div class="div-pai">

    <div class="welcome">
            <h1>Bem-vindo, {{ account?.name }}!</h1>
    </div>
    
    <div class="saldo">
    
        <div>
            <mat-card appearance="outlined">
                <mat-card-header class="mb-30">
                    <mat-card-title class="mb-30">Saldo em Conta</mat-card-title>
                    <mat-card-subtitle class="fz-20">R$ {{ account?.balance }}</mat-card-subtitle>
                </mat-card-header>
            
            </mat-card>
        </div>    
        <div>
            <mat-card appearance="outlined">
                <mat-card-header class="mb-30">
                    <mat-card-title class="mb-30">Receitas</mat-card-title>
                    <mat-card-subtitle class="fz-20">R$ 4.500,00</mat-card-subtitle>
                </mat-card-header>
            
            </mat-card>
        </div>    
        <div>
            <mat-card appearance="outlined">
                <mat-card-header class="mb-30">
                    <mat-card-title class="mb-30">Despesas</mat-card-title>
                    <mat-card-subtitle class="fz-20 fc-red">-R$ 1.720,00</mat-card-subtitle>
                </mat-card-header>
            
            </mat-card>
        </div>        
            
    </div>

    <div>
        <div class="mt-40">
            <h1>Últimas Transações</h1>
        </div>
        
        <mat-card appearance="outlined" class="mt-40">
            <mat-card-content>
                <table mat-table [dataSource]="transactions">
                    <!-- <ng-container matColumnDef="id">
                        <th mat-header-cell *matHeaderCellDef>id</th>
                        <td mat-cell *matCellDef="let transactions">{{ transactions.id }}</td>
                    </ng-container> -->
    
                    <ng-container matColumnDef="date">
                        <th mat-header-cell *matHeaderCellDef>Data</th>
                        <td mat-cell *matCellDef="let transactions">{{ transactions.date }}</td>
                    </ng-container>
    
                    <ng-container matColumnDef="description">
                        <th mat-header-cell *matHeaderCellDef>Descrição</th>
                        <td mat-cell *matCellDef="let transactions">{{ transactions.description }}</td>
                    </ng-container>
    
                    <ng-container matColumnDef="amount">
                        <th mat-header-cell *matHeaderCellDef>Valor</th>
                        <td mat-cell *matCellDef="let transactions">{{ transactions.amount }}</td>
                    </ng-container>
    
                    <tr mat-header-row *matHeaderRowDef="colunasTabela" ></tr>
                    <tr mat-row *matRowDef="let row; columns: colunasTabela"></tr>
    
                </table>
            </mat-card-content>

            <div class="ver-tudo mt-40">
                <button mat-button>Ver tudo</button>               
            </div>
                     
            

        </mat-card>

    </div>
</div>
