<div class="mt-5">
        <!-- <div class="mt-40 mb-5">
            <mat-card-title class="mb-4 fs-3">Extrato</mat-card-title>            
        </div> -->
        
        <mat-card appearance="outlined" class="mt-40 p-3">
            <mat-card-title class="mb-4 mt-4 mx-3 fs-4">Extrato</mat-card-title>
            <mat-card-content>
                <table mat-table [dataSource]="transactions">
                    <!-- <ng-container matColumnDef="id">
                        <th mat-header-cell *matHeaderCellDef>id</th>
                        <td mat-cell *matCellDef="let transactions">{{ transactions.id }}</td>
                    </ng-container> -->
    
                    <ng-container matColumnDef="date">
                        <th mat-header-cell *matHeaderCellDef>Data</th>
                        <td mat-cell *matCellDef="let transactions">{{ transactions.date | date: 'dd/MM/yyyy'}}</td>
                    </ng-container>
    
                    <ng-container matColumnDef="description">
                        <th mat-header-cell *matHeaderCellDef>Descrição</th>
                        <td mat-cell *matCellDef="let transactions">{{ transactions.description }}</td>
                    </ng-container>
    
                    <ng-container matColumnDef="amount">
                        <th mat-header-cell *matHeaderCellDef>Valor</th>
                        <td mat-cell 
                            *matCellDef="let transactions" 
                            [class]="transactions.amount  | negativeValues" >
                            {{ transactions.amount | currency: "BRL" : "symbol" : "1.2-2" }}
                        </td>
                    </ng-container>

                    <ng-container matColumnDef="type">
                        <th mat-header-cell *matHeaderCellDef>Tipo</th>
                        <td mat-cell *matCellDef="let transactions">{{ transactions.type === transactionsTypesEnum.INCOME ? "Entrada" : "Saída" }}</td>
                    </ng-container>
    
                    <tr mat-header-row *matHeaderRowDef="colunasTabela" ></tr>
                    <tr mat-row *matRowDef="let row; columns: colunasTabela"></tr>
    
                </table>
            </mat-card-content>

            <!-- <div class="mt-30 d-flex justify-content-center align-items-center">
                <button class="px-4 mx-5 mb-4 fs-5" mat-stroked-button>Ver tudo</button>               
            </div> -->
                     
            

        </mat-card>

</div>
